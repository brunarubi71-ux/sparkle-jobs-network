workflows:
  ios-release:
    name: Shinely iOS — App Store
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - Shinely
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        APP_STORE_ID: "6780314043"
        BUNDLE_ID: "com.shinely.app"
        APP_STORE_CONNECT_KEY_IDENTIFIER: "X6QPQYB8X8"
        APP_STORE_CONNECT_ISSUER_ID: "da315e05-ca3e-41db-a227-28f08bbb017b"
      node: 22.13.1

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Capacitor sync iOS
        script: npx cap sync ios

      - name: Get Team ID from App Store Connect API
        script: |
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" | base64 --decode > /tmp/AuthKey.p8
          TEAM_ID=$(app-store-connect bundle-ids list \
            --identifier "$BUNDLE_ID" \
            --private-key @file:/tmp/AuthKey.p8 \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --json 2>/dev/null | python3 -c \
            "import json,sys; d=json.load(sys.stdin); print(d[0]['attributes']['seedId']) if d else exit(1)" 2>/dev/null)
          if [ -z "$TEAM_ID" ]; then echo "ERROR: Could not get Team ID"; exit 1; fi
          echo "Team ID: $TEAM_ID"
          echo "TEAM_ID=$TEAM_ID" >> $CM_ENV

      - name: Set version from codemagic
        script: |
          LATEST=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_ID" \
            --private-key @file:/tmp/AuthKey.p8 \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --pre-release-version 1.0 2>/dev/null || echo "0")
          BUILD=$((LATEST + 1))
          agvtool new-version -all $BUILD
          agvtool new-marketing-version 1.0
        working_directory: ios/App

      - name: Build and sign IPA
        script: |
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" | base64 --decode > /tmp/AuthKey.p8

          WORKSPACE="ios/App/App.xcworkspace"
          if [ -d "$WORKSPACE" ]; then
            BUILD_FLAGS="-workspace $WORKSPACE"
          else
            BUILD_FLAGS="-project $XCODE_PROJECT"
          fi

          xcodebuild \
            $BUILD_FLAGS \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath /tmp/App.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath /tmp/AuthKey.p8 \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            archive

          cat > /tmp/ExportOptions.plist << PLIST
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
  <key>method</key>
  <string>app-store</string>
  <key>teamID</key>
  <string>$TEAM_ID</string>
</dict>
</plist>
PLIST

          mkdir -p build/ios/ipa
          xcodebuild \
            -exportArchive \
            -archivePath /tmp/App.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath /tmp/AuthKey.p8 \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - Testers internos

  android-release:
    name: Shinely Android — Google Play
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      android_signing:
        - shinely_keystore
      vars:
        PACKAGE_NAME: "com.shinely.app"
      node: 22.13.1

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Capacitor sync Android
        script: npx cap sync android

      - name: Build Android App Bundle
        script: |
          cd android
          ./gradlew bundleRelease

    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
