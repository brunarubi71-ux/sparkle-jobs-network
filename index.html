    <meta name="theme-color" content="#A855F7" />

    <!-- Prevent browsers from auto-translating the brand name "Shinely" -->
    <meta name="google" content="notranslate" />

    <title translate="no">Shinely</title>
    <meta name="description" content="Shinely connects cleaners and helpers with premium cleaning jobs near you. Post a job, get hired, get paid — fast and secure." />
    <link rel="canonical" href="https://shinelyapp.com/" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/pwa-192x192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Shinely" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Shinely" />
    <meta property="og:title" content="Shinely — Premium Cleaning Jobs Marketplace" />
    <meta property="og:description" content="Connect with premium cleaning jobs near you. Post, get hired, get paid — fast and secure." />
    <meta property="og:url" content="https://shinelyapp.com/" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="pt_BR" />
    <meta property="og:locale:alternate" content="es_ES" />
    <meta property="og:image" content="https://pub-bb2e103a32db4e198524a2e9ed8f35b4.r2.dev/58e17df9-d8bc-42ff-b1b0-4e412499fc77/id-preview-5e008e12--354ff4b4-a81e-4676-844d-5133041fbe1a.lovable.app-1776447079121.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Shinely — Premium Cleaning Jobs Marketplace" />
    <meta name="twitter:description" content="Connect with premium cleaning jobs near you. Post, get hired, get paid — fast and secure." />
    <meta name="twitter:image" content="https://pub-bb2e103a32db4e198524a2e9ed8f35b4.r2.dev/58e17df9-d8bc-42ff-b1b0-4e412499fc77/id-preview-5e008e12--354ff4b4-a81e-4676-844d-5133041fbe1a.lovable.app-1776447079121.png" />
  </head>

  <body>
    <div id="root">
      <noscript>
        <div style="padding:32px;font-family:system-ui;background:#F5F0FF;min-height:100vh;">
          <h1 style="color:#7c3aed">Shinely</h1>
          <p>JavaScript precisa estar habilitado para usar o Shinely.</p>
        </div>
      </noscript>
      <div id="__shinely_boot_marker" style="display:none">booting</div>
      <div id="__shinely_boot_fallback" style="position:fixed;inset:0;background:#F5F0FF;display:flex;align-items:center;justify-content:center;z-index:1;">
        <div style="text-align:center;font-family:system-ui;color:#1a1a1a;">
          <div style="width:48px;height:48px;border:4px solid #ddd;border-top-color:#7c3aed;border-radius:50%;animation:shinely-spin 1s linear infinite;margin:0 auto 16px;"></div>
          <div id="__shinely_boot_status" style="font-size:13px;color:#7c3aed;font-weight:600;">Carregando Shinely…</div>
          <div id="__shinely_boot_detail" style="font-size:11px;color:#888;margin-top:8px;max-width:520px;padding:0 16px;"></div>
        </div>
      </div>
    </div>
    <style>@keyframes shinely-spin{to{transform:rotate(360deg)}}</style>
    <script>
      // If the JS bundle hasn't replaced this fallback within 12s, show a
      // diagnostic so the screen isn't just a perpetual spinner. Helps
      // distinguish "JS never loaded" from "JS crashed silently".
      window.__shinely_boot_at = Date.now();
      setTimeout(function () {
        var status = document.getElementById("__shinely_boot_status");
        var detail = document.getElementById("__shinely_boot_detail");
        var marker = document.getElementById("__shinely_boot_marker");
        if (!marker) return; // App rendered (it replaced #root contents)
        if (marker.dataset && marker.dataset.replaced === "1") return;
        if (status) status.textContent = "Não conseguimos iniciar o Shinely.";
        if (detail) {
          detail.textContent =
            "User agent: " + (navigator.userAgent || "?") +
            " | Time: " + new Date().toISOString() +
            " | URL: " + window.location.href;
        }
      }, 12000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
